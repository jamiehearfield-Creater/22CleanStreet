<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22 Clean Street</title>
<style>
:root{
  --brand:#1650d6;--brand-dark:#0d3aa0;--brand-tint:#eaf0fe;
  --ink:#101828;--muted:#667085;--line:#e6eaf1;--bg:#f6f8fc;--card:#fff;
  --red:#e5484d;--red-t:#fdecec;--amber:#e08a00;--amber-t:#fbf1de;
  --green:#12996b;--green-t:#e4f5ee;--done:#7a8699;--done-t:#eef1f6;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 6px 20px rgba(16,24,40,.06);--r:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
h1,h2,h3{margin:0;font-weight:780;letter-spacing:-.01em}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
.mono{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}

header{background:#0c1426;color:#fff;position:sticky;top:0;z-index:20}
.hwrap{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:18px;height:62px}
.logo{width:38px;height:38px;border-radius:9px;background:#fff;display:grid;place-items:center;flex:0 0 auto}
.logo b{color:var(--brand);font-weight:850;font-size:20px;letter-spacing:-.05em}
.brandname{font-weight:850;font-size:15px;letter-spacing:.02em;line-height:1}
.brandname small{display:block;font-size:9px;letter-spacing:.24em;color:#8494b8;font-weight:700;margin-top:2px}
.hsp{flex:1}
.datamenu{position:relative}
.datamenu>button{background:#1a2743;border:0;color:#c8d3e8;padding:8px 12px;border-radius:9px;font-weight:650;font-size:13px}
.datamenu>button:hover{background:#25355a;color:#fff}
.dropdown{position:absolute;right:0;top:44px;background:#fff;color:var(--ink);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:6px;min-width:210px;display:none}
.dropdown.show{display:block}
.dropdown button,.dropdown label{display:block;width:100%;text-align:left;background:none;border:0;padding:9px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer}
.dropdown button:hover,.dropdown label:hover{background:var(--brand-tint)}
.dropdown .sep{height:1px;background:var(--line);margin:4px 0}

.tabs{background:#0c1426;border-top:1px solid #1b2743}
.twrap{max-width:1180px;margin:0 auto;padding:0 12px;display:flex;gap:2px;overflow-x:auto}
.tab{background:none;border:0;color:#8fa0c4;padding:12px 13px 13px;font-weight:700;font-size:13.5px;white-space:nowrap;border-bottom:3px solid transparent;display:flex;align-items:center;gap:7px}
.tab .n{width:20px;height:20px;border-radius:6px;background:#1b2743;color:#a9b7d6;font-size:11px;font-weight:800;display:grid;place-items:center}
.tab .cnt{background:var(--red);color:#fff;border-radius:20px;font-size:10.5px;font-weight:800;padding:1px 7px;min-width:18px;text-align:center}
.tab:hover{color:#fff}
.tab.on{color:#fff;border-bottom-color:var(--brand)}
.tab.on .n{background:var(--brand);color:#fff}

.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 70px}
.page-h h1{font-size:23px}
.page-h p{margin:5px 0 0;color:var(--muted);font-size:14px}
.head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:20px}

.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 15px;border-radius:10px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.btn:hover{background:#fafbfe;border-color:#d4dcea}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn.big{padding:13px 20px;font-size:15px;border-radius:11px}
.btn.sm{padding:7px 11px;font-size:13px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:#eef1f7;color:var(--ink)}
.btn.danger{color:var(--red);border-color:#f2cccc}
.btn.danger:hover{background:var(--red-t)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:20px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.seg{display:inline-flex;background:#eef1f7;border-radius:10px;padding:3px;gap:2px}
.seg button{border:0;background:none;padding:7px 13px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:750;padding:4px 11px;border-radius:20px}
.badge .dot{width:8px;height:8px;border-radius:50%}
.b-red{background:var(--red-t);color:var(--red)} .b-red .dot{background:var(--red)}
.b-amber{background:var(--amber-t);color:var(--amber)} .b-amber .dot{background:var(--amber)}
.b-green{background:var(--green-t);color:var(--green)} .b-green .dot{background:var(--green)}
.b-done{background:var(--done-t);color:var(--done)} .b-done .dot{background:var(--done)}

.calbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.calbar .m{font-size:19px;font-weight:800;min-width:150px;text-align:center}
.calbar select{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font-weight:650;font-size:13.5px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);font-weight:650;margin:2px 0 16px}
.legend span{display:inline-flex;align-items:center;gap:7px}
.legend .dot{width:11px;height:11px;border-radius:50%}
.cal{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.cal .dow{display:grid;grid-template-columns:repeat(7,1fr);background:#fbfcfe;border-bottom:1px solid var(--line)}
.cal .dow div{padding:10px 12px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:112px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px;position:relative}
.cell:nth-child(7n){border-right:0}
.cell.dim{background:#fafbfd}
.cell.off{background:repeating-linear-gradient(45deg,#f4f6fa,#f4f6fa 6px,#eef1f7 6px,#eef1f7 12px)}
.cell.off .dnum{color:#aeb8c9}
.evt.cancelled{background:#f3f4f7;border-color:#c2ccdd;color:#8a93a3;text-decoration:line-through;opacity:.8}
.cell.today{background:var(--brand-tint)}
.cell .dnum{font-size:12.5px;font-weight:750;color:var(--muted);margin-bottom:5px;display:inline-block}
.cell.today .dnum{color:var(--brand);font-weight:850}
.cell .add{position:absolute;top:5px;right:6px;width:20px;height:20px;border-radius:6px;border:0;background:transparent;color:#c2ccdd;font-size:16px;line-height:1;display:none}
.cell:hover .add{display:block}
.cell .add:hover{background:var(--brand-tint);color:var(--brand)}
.evt{border-radius:7px;padding:4px 7px;margin-bottom:4px;font-size:11.5px;font-weight:650;cursor:pointer;border-left:3px solid;line-height:1.25}
.evt .tm{font-weight:800;font-variant-numeric:tabular-nums}
.evt.red{background:var(--red-t);border-color:var(--red);color:#a5242a}
.evt.amber{background:var(--amber-t);border-color:var(--amber);color:#8a5500}
.evt.green{background:var(--green-t);border-color:var(--green);color:#0a6a49}
.evt.done{background:var(--done-t);border-color:var(--done);color:#54606f;text-decoration:line-through;opacity:.85}
.evt:hover{filter:brightness(.97)}

.util-strip{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.util-strip .u{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 15px;box-shadow:var(--shadow);flex:1;min-width:110px}
.util-strip .u .l{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:800}
.util-strip .u .v{font-size:20px;font-weight:850;margin-top:4px}

.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:750;margin-bottom:6px;color:#344054}
.field .hint{font-weight:500;color:var(--muted);font-size:12px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.field textarea{resize:vertical;min-height:70px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.sec-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800;margin:6px 0 10px;padding-top:14px;border-top:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chk{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);padding:8px 12px;border-radius:9px;font-size:13.5px;font-weight:650;cursor:pointer;user-select:none}
.chk input{margin:0}
.chk.on{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-dark)}
.moneypreview{background:var(--green-t);border:1px solid #bfe6d5;border-radius:11px;padding:13px 15px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.moneypreview b{font-size:17px}
.warn{background:var(--amber-t);border:1px solid #edcf92;border-radius:10px;padding:10px 13px;font-size:13px;color:#8a5500;font-weight:600;margin-top:4px}
.warn.hard{background:var(--red-t);border-color:#f0b7b7;color:#a5242a}
.repline{font-size:13px;color:var(--brand-dark);font-weight:700;margin-top:2px}

table{width:100%;border-collapse:collapse}
.tbl{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.tbl th{background:#fbfcfe;text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:800;padding:12px 15px;border-bottom:1px solid var(--line)}
.tbl td{padding:13px 15px;border-bottom:1px solid #eef1f7;vertical-align:middle}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr.click{cursor:pointer}
.tbl tbody tr.click:hover{background:#fafbff}
.tbl tfoot td{padding:12px 15px;font-weight:800;background:#fbfcfe;border-top:2px solid var(--line)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-tint);color:var(--brand-dark);display:inline-grid;place-items:center;font-weight:800;font-size:12.5px;flex:0 0 auto}
.who{display:flex;align-items:center;gap:11px}
.empty{padding:44px;text-align:center;color:var(--muted)}
.empty .big{font-size:16px;font-weight:750;color:var(--ink);margin-bottom:4px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--shadow)}
.kpi .l{font-size:12px;color:var(--muted);font-weight:750;text-transform:uppercase;letter-spacing:.04em}
.kpi .v{font-size:27px;font-weight:850;letter-spacing:-.02em;margin-top:6px;line-height:1}
.kpi .s{font-size:12.5px;color:var(--muted);margin-top:6px}
.kpi.green .v{color:var(--green)} .kpi.red .v{color:var(--red)} .kpi.brand .v{color:var(--brand)}

.mbars{display:flex;gap:10px;align-items:flex-end;height:150px;padding:6px 0}
.mbar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px;height:100%}
.mbar .stack{width:64%;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.mbar .fill{width:100%;border-radius:7px 7px 0 0;min-height:3px;background:var(--brand)}
.mbar .cap{font-size:11px;font-weight:700;color:var(--muted)}
.mbar .amt{font-size:12px;font-weight:800}

.stepper{display:flex;margin:8px 0 22px;flex-wrap:wrap}
.step{flex:1;min-width:110px;text-align:center;position:relative;padding:0 4px}
.step .ball{width:36px;height:36px;border-radius:50%;margin:0 auto 8px;display:grid;place-items:center;font-weight:800;background:#eef1f7;color:var(--muted);border:2px solid var(--line);z-index:1;position:relative}
.step.done .ball{background:var(--green);border-color:var(--green);color:#fff}
.step.current .ball{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 0 4px var(--brand-tint)}
.step .lb{font-size:12.5px;font-weight:700;color:var(--muted)}
.step.done .lb,.step.current .lb{color:var(--ink)}
.step:not(:last-child):after{content:"";position:absolute;top:18px;left:50%;width:100%;height:2px;background:var(--line);z-index:0}
.step.done:not(:last-child):after{background:var(--green)}

.wkrow{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #eef1f7}
.wkrow .lbl{width:110px;font-weight:700;font-size:13.5px}
.wkrow .track{flex:1;height:14px;background:#eef1f7;border-radius:20px;overflow:hidden}
.wkrow .track i{display:block;height:100%;border-radius:20px}
.wkrow .fig{width:170px;text-align:right;font-size:13px;font-weight:650;font-variant-numeric:tabular-nums}
.wkrow .gap{color:var(--green);font-weight:750}

.actgroup{margin-bottom:18px}
.actgroup .gh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.actgroup .gh h3{font-size:15px}
.actrow{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:8px;box-shadow:var(--shadow)}
.actrow .marker{width:6px;align-self:stretch;border-radius:6px;min-height:34px}
.actrow .main{flex:1;min-width:0}
.actrow .main b{font-size:14.5px}
.actrow .main .sub{color:var(--muted);font-size:12.5px;margin-top:2px}

.overlay{position:fixed;inset:0;background:rgba(12,20,38,.5);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:44px 16px;overflow:auto}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(12,20,38,.35);animation:pop .16s ease}
.modal.wide{max-width:720px}
@keyframes pop{from{transform:translateY(8px);opacity:.5}to{transform:none;opacity:1}}
.modal-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:20px 22px 0}
.modal-h h2{font-size:18px}
.modal-h .x{border:0;background:none;font-size:24px;color:var(--muted);line-height:1;padding:0 4px}
.modal-h .x:hover{color:var(--ink)}
.modal-b{padding:16px 22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;align-items:center}
.dl{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px}
.dl .k{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:800}
.dl .v{font-size:15px;margin-top:2px}
.dl .full{grid-column:1/-1}
.histrow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #eef1f7;font-size:13.5px}

#toasts{position:fixed;bottom:22px;right:22px;z-index:90;display:flex;flex-direction:column;gap:9px}
.toast{background:#0c1426;color:#fff;padding:12px 17px;border-radius:11px;font-size:14px;font-weight:650;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:sl .2s ease;max-width:320px}
.toast.good{background:var(--green)} .toast.bad{background:var(--red)}
@keyframes sl{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.notice{background:var(--brand-tint);border:1px solid #d3e0fb;border-radius:11px;padding:12px 15px;font-size:13.5px;display:flex;gap:10px;color:#25406f}
.notice .i{font-weight:800}

@media (max-width:860px){.grid2{grid-template-columns:1fr}.cell{min-height:84px}.wkrow .fig{width:auto}}
@media print{header,.tabs,.modal-f,.modal-h .x{display:none!important}}

#authgate{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0c1426,#16234a);display:flex;align-items:center;justify-content:center;padding:20px}
#authgate.hide{display:none}
.authcard{background:#fff;border-radius:18px;width:100%;max-width:400px;padding:30px 30px 34px;box-shadow:0 30px 70px rgba(0,0,0,.4)}
.authlogo{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.authlogo .mark{width:44px;height:44px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:850;font-size:22px;letter-spacing:-.05em}
.authlogo .an{font-weight:850;font-size:15px;letter-spacing:.02em;line-height:1.1}
.authlogo .an small{display:block;font-size:9px;letter-spacing:.24em;color:var(--muted);font-weight:700;margin-top:2px}
.authcard h2{font-size:20px;margin-bottom:4px}
.authsub{color:var(--muted);font-size:13.5px;margin-bottom:18px}
.afield{margin-bottom:14px}
.afield label{display:block;font-size:13px;font-weight:750;margin-bottom:6px;color:#344054}
.afield input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px}
.afield input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.aerr{color:var(--red);font-size:13px;font-weight:600;min-height:18px;margin-bottom:8px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="logo"><b>22</b></div>
    <div class="brandname">CLEAN STREET<small>OPERATIONS</small></div>
    <div class="hsp"></div>
    <div class="datamenu">
      <button id="dataBtn">Data ▾</button>
      <div class="dropdown" id="dataDrop">
        <button data-action="bizdetails">🏢 Business details</button>
        <div class="sep"></div>
        <button data-action="refresh">🔄 Refresh from server</button>
        <div class="sep"></div>
        <button data-action="export">⬇ Export backup</button>
        <label>⬆ Import backup<input type="file" id="importFile" accept="application/json" style="display:none"></label>
        <div class="sep"></div>
        <button data-action="logout">🚪 Log out</button>
      </div>
    </div>
  </div>
  <div class="tabs"><div class="twrap" id="tabs"></div></div>
</header>

<div class="wrap" id="wrap"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div id="toasts"></div>

<div id="authgate">
  <div class="authcard">
    <div class="authlogo"><div class="mark">22</div><div class="an">CLEAN STREET<small>OPERATIONS</small></div></div>
    <div id="auth_login">
      <h2>Sign in</h2>
      <p class="authsub">Enter the email and password for your account.</p>
      <div class="afield"><label>Email</label><input id="lg_email" type="email" autocomplete="username" placeholder="you@example.com"></div>
      <div class="afield"><label>Password</label><input id="lg_pw" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <div class="aerr" id="lg_err"></div>
      <button class="btn primary big" style="width:100%;justify-content:center" data-action="dologin">Sign in</button>
      <button class="btn ghost" style="width:100%;justify-content:center;margin-top:8px" data-action="forgot">Forgot password?</button>
    </div>
    <div id="auth_setpw" style="display:none">
      <h2>Set your password</h2>
      <p class="authsub">Choose a password for your account, then you're in.</p>
      <div class="afield"><label>New password</label><input id="sp_pw" type="password" autocomplete="new-password" placeholder="at least 6 characters"></div>
      <div class="aerr" id="sp_err"></div>
      <button class="btn primary big" style="width:100%;justify-content:center" data-action="setpw">Save password &amp; continue</button>
    </div>
    <div id="auth_busy" style="display:none;text-align:center;color:var(--muted);padding:10px">Loading…</div>
  </div>
</div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const uid=p=>p+"_"+Math.random().toString(36).slice(2,9);
const money=n=>"£"+(Number(n)||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
const money0=n=>"£"+Math.round(Number(n)||0).toLocaleString("en-GB");

}

/* ---------- diff-based save (only writes what actually changed) ---------- */
let _saving=false,_pending=false;
function save(){ if(!appReady) return; if(_saving){_pending=true;return;} _saving=true; doSync().catch(e=>{console.error(e);toast("Couldn't save to server — "+(e.message||"check connection"),"bad");}).finally(()=>{_saving=false;if(_pending){_pending=false;save();}}); }
async function syncTable(table,arr,toRow,snapMap){
  const curIds=new Set((arr||[]).map(x=>x.id));
  const changed=[];
  (arr||[]).forEach(x=>{const j=JSON.stringify(toRow(x));if(snapMap[x.id]!==j)changed.push({id:x.id,row:toRow(x),j});});
  if(changed.length){const {error}=await sb.from(table).upsert(changed.map(c=>c.row));if(error)throw error;changed.forEach(c=>snapMap[c.id]=c.j);}
  const removed=Object.keys(snapMap).filter(id=>!curIds.has(id));
  if(removed.length){const {error}=await sb.from(table).delete().in("id",removed);if(error)throw error;removed.forEach(id=>delete snapMap[id]);}
}
async function doSync(){
  const sRow=metaToRow(state.meta),sJ=JSON.stringify(sRow);
  if(sJ!==snap.settings){const {error}=await sb.from("business_settings").update(sRow).eq("id",1);if(error)throw error;snap.settings=sJ;}
  await syncTable("cleaners",state.cleaners,cleanerToRow,snap.cleaners);
  await syncTable("clients",state.clients,clientToRow,snap.clients);
  await syncTable("jobs",state.jobs,jobToRow,snap.jobs);
  await syncTable("expenses",state.expenses,expenseToRow,snap.expenses);
}
/* ---------- keep open-ended recurring series topped up ---------- */
function topUpSeries(){
  const horizon=addDaysISO(todayISO(),OPEN_HORIZON_DAYS), trigger=addDaysISO(todayISO(),OPEN_TOPUP_DAYS);
  const series={};
  state.jobs.forEach(j=>{if(j.seriesId&&j.seriesOpen&&!j.cancelled){(series[j.seriesId]=series[j.seriesId]||[]).push(j);}});
  let added=0;
  Object.values(series).forEach(list=>{
    if(list.length>=SERIES_CAP)return;
    list.sort((a,b)=>a.date.localeCompare(b.date));
    const last=list[list.length-1], step=last.seriesStep||7;
    if(last.date>=trigger)return; // still enough future bookings
    let d=addDaysISO(last.date,step), guard=0;
    while(d<=horizon && list.length+guard<SERIES_CAP && guard<400){
      const clone=Object.assign({},last,{id:uid("j"),date:d,stage:0,cleanerConfirmed:false,invoiceNo:null,invoicedDate:null,
        paidToCleaner:false,cleanerPaidDate:null,cancelled:false,cancelReason:"",cancelledDate:null});
      state.jobs.push(clone); added++; guard++; d=addDaysISO(d,step);
    }
  });
  if(added){save();}
}
function migrate(){
  const m=state.meta=state.meta||{};
  const defs={company:"22 Clean Street",email:"hello@22cleanstreet.co.uk",phone:"01482 000000",address:"Hull, East Yorkshire",
    invoiceSeq:1042,vatRegistered:false,vatRate:20,vatNumber:"",paymentTermsDays:7,bankName:"",bankSort:"",bankAcc:"",mileageRate:0.45};
  for(const k in defs) if(m[k]==null) m[k]=defs[k];
  state.clients=state.clients||[];
  state.expenses=state.expenses||[];
  (state.cleaners||[]).forEach(c=>{if(c.weeklyHours==null)c.weeklyHours=20;if(!c.hoursOverrides)c.hoursOverrides={};if(c.utr==null)c.utr="";
    if(!Array.isArray(c.availableDays))c.availableDays=[0,1,2,3,4];});
  (state.jobs||[]).forEach(j=>{
    if(j.invoiceNo===undefined)j.invoiceNo=null;
    if(j.invoicedDate===undefined)j.invoicedDate=null;
    if(j.time==null)j.time="09:00";
    if(j.seriesId===undefined)j.seriesId=null;
    if(j.seriesStep===undefined)j.seriesStep=null;
    if(j.seriesOpen==null)j.seriesOpen=false;
    if(j.paidToCleaner==null)j.paidToCleaner=false;
    if(j.cleanerPaidDate===undefined)j.cleanerPaidDate=null;
    if(j.clientId===undefined)j.clientId=null;
    if(j.cancelled==null)j.cancelled=false;
    if(j.cancelReason==null)j.cancelReason="";
    if(j.cancelledDate===undefined)j.cancelledDate=null;
  });
  // build client records from existing jobs if none exist yet
  if(!state.clients.length){
    const map={};
    state.jobs.forEach(j=>{
      const key=(j.client||"").toLowerCase().trim();
      if(!key||key.includes("enquiry"))return;
      if(!map[key]){map[key]={id:uid("cl"),name:j.client,email:j.email||"",phone:"",address:j.address||"",
        defaultPrice:j.price||0,defaultHours:j.hours||2,defaultService:j.service||"Standard clean",notes:"",active:true};}
      j.clientId=map[key].id;
    });
    state.clients=Object.values(map);
  }
}

function bookedHours(cid,from,to){return state.jobs.filter(j=>!j.cancelled&&j.cleanerId===cid&&j.date>=from&&j.date<=to).reduce((a,j)=>a+(+j.hours||0),0);}
function weeksInMonth(y,m){const first=isoOf(y,m,1);let mon=mondayISO(first);const last=isoOf(y,m,new Date(y,m+1,0).getDate());const out=[];let g=0;while(mon<=last&&g++<7){out.push(mon);mon=addDaysISO(mon,7);}return out;}
function weeklyHoursFor(c,dateISO){if(!c)return 0;const mon=mondayISO(dateISO);const o=c.hoursOverrides?c.hoursOverrides[mon]:undefined;return (o==null?c.weeklyHours:o)||0;}
function cleanerMonthStats(cid,y,m){const c=cleanerById(cid);const weeks=weeksInMonth(y,m);const from=weeks[0],to=addDaysISO(weeks[weeks.length-1],6);
  const jobs=state.jobs.filter(j=>!j.cancelled&&j.cleanerId===cid&&j.date>=from&&j.date<=to);const booked=jobs.reduce((a,j)=>a+(+j.hours||0),0);
  const capacity=weeks.reduce((a,mon)=>a+weeklyHoursFor(c,mon),0);return {jobs:jobs.length,booked,capacity,spare:Math.max(0,capacity-booked),util:capacity?booked/capacity:0,weeks};}
function waNumber(phone){let d=(phone||"").replace(/[^\d+]/g,"");if(!d)return "";if(d[0]==="+")d=d.slice(1);else if(d.slice(0,2)==="00")d=d.slice(2);else if(d[0]==="0")d="44"+d.slice(1);return d;}
const jobStartMin=j=>timeToMin(j.time);
const jobEndMin=j=>jobStartMin(j)+Math.round((+j.hours||0)*60);
function cleanerConflicts(cid,date,time,hours,excludeId){const s=timeToMin(time),e=s+Math.round((+hours||0)*60);
  return state.jobs.filter(j=>!j.cancelled&&j.id!==excludeId&&j.cleanerId===cid&&j.date===date&&j.stage<S_PAID&&jobStartMin(j)<e&&s<jobEndMin(j));}
function weekBookedHours(cid,date,excludeId){const mon=mondayISO(date),sun=addDaysISO(mon,6);
  return state.jobs.filter(j=>!j.cancelled&&j.cleanerId===cid&&j.id!==excludeId&&j.date>=mon&&j.date<=sun).reduce((a,j)=>a+(+j.hours||0),0);}
function clientStats(id){const js=state.jobs.filter(j=>j.clientId===id&&!j.cancelled);const done=js.filter(j=>j.stage>=S_COMPLETE);
  return {total:js.length,upcoming:js.filter(j=>j.stage<S_COMPLETE).length,billed:done.reduce((a,j)=>a+(+j.price||0),0),
    last:done.length?done.map(j=>j.date).sort().pop():null,jobs:js};}
// weekday index 0=Mon..6=Sun
function weekdayIdx(dateISO){return (new Date(dateISO+"T12:00").getDay()+6)%7;}
const DAY_NAMES=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function cleanerWorksDay(c,dateISO){const days=c&&c.availableDays;if(!days||!days.length)return true;return days.includes(weekdayIdx(dateISO));}
function anyCleanerWorksDay(dateISO){const act=state.cleaners.filter(c=>c.active);if(!act.length)return true;return act.some(c=>cleanerWorksDay(c,dateISO));}
// expenses + allowances
const EXP_CATS=[["mileage","Mileage"],["casual","Casual wages"],["fuel","Fuel allowance"],["products","Products allowance"],["general","General expense"]];
const expCatLabel=k=>(EXP_CATS.find(c=>c[0]===k)||[k,k])[1];
function expensesIn(from,to){return (state.expenses||[]).filter(e=>e.date>=from&&e.date<=to);}
function cleanerAllowancesIn(cid,from,to){return (state.expenses||[]).filter(e=>e.cleanerId===cid&&(e.category==="fuel"||e.category==="products")&&e.date>=from&&e.date<=to);}
function periodRange(p){const t=todayISO(),d=new Date();
  if(p==="thisweek"){const mon=mondayISO(t);return [mon,addDaysISO(mon,6)];}
  if(p==="lastweek"){const mon=addDaysISO(mondayISO(t),-7);return [mon,addDaysISO(mon,6)];}
  if(p==="thismonth"){return [isoOf(d.getFullYear(),d.getMonth(),1),isoOf(d.getFullYear(),d.getMonth(),new Date(d.getFullYear(),d.getMonth()+1,0).getDate())];}
  const mm=(d.getMonth()+11)%12,yy=d.getMonth()===0?d.getFullYear()-1:d.getFullYear();
  return [isoOf(yy,mm,1),isoOf(yy,mm,new Date(yy,mm+1,0).getDate())];}
const PERIOD_LABEL={thisweek:"this week",lastweek:"last week",thismonth:"this month",lastmonth:"last month"};

  const cells=Array.from({length:42},(_,i)=>addDaysISO(gridStart,i));
  const filter=ui.calFilter;

  state.jobs.filter(j=>!j.cancelled&&(!filter||j.cleanerId===filter)).forEach(j=>{(byDate[j.date]=byDate[j.date]||[]).push(j);});
  const dow=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div>${d}</div>`).join("");

  const grid=cells.map(dstr=>{
    const dd=new Date(dstr+"T12:00");const inMonth=dd.getMonth()===m;const isToday=dstr===todayISO();
    const avail=filterC?cleanerWorksDay(filterC,dstr):anyCleanerWorksDay(dstr);

      `<div class="evt ${calStatus(j)}" data-action="job" data-id="${j.id}"><span class="tm">${j.time}</span> ${esc(j.client)}</div>`).join("");
    return `<div class="cell ${inMonth?'':'dim'} ${isToday?'today':''} ${avail?'':'off'}" title="${avail?'':'No cleaner set to work this day — you can still book'}"><span class="dnum">${dd.getDate()}</span>
      <button class="add" data-action="addon" data-d="${dstr}" title="Add booking">+</button>${evs}</div>`;

  let strip="";

  $("#wrap").innerHTML=`
    <div class="head-row">
      <div class="page-h"><h1>Calendar</h1><p>Your month at a glance. ${filter?"Greyed days are ones this cleaner isn't set to work — you can still book them.":"Greyed days have no cleaner set to work — you can still book them."} Click any booking to open it.</p></div>
      <div class="calbar">
        <select data-action="calfilter"><option value="">All cleaners</option>
          ${state.cleaners.filter(c=>c.active).map(c=>`<option value="${c.id}" ${filter===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select>
        ${filter?`<button class="btn sm" data-action="rota" data-id="${filter}">✉ Send rota</button>`:""}
        <button class="btn sm" data-action="calnav" data-n="-1">‹</button>
        <span class="m">${MONTHS[m]} ${y}</span>
        <button class="btn sm" data-action="calnav" data-n="1">›</button>
        <button class="btn sm" data-action="calnav" data-n="0">Today</button>
        <button class="btn primary sm" data-action="newbooking">+ New booking</button>
      </div>
    </div>${strip}
    <div class="legend">
      <span><span class="dot" style="background:var(--red)"></span>Booked — no cleaner</span>

function bookingWarn(){
  const div=$("#cleanerWarn");if(!div)return;
  const cid=$("#f_cleaner").value;if(!cid){div.innerHTML="";return;}
  const date=$("#f_date").value,time=$("#f_time").value,hours=+$("#f_hours").value||0;
  const conf=cleanerConflicts(cid,date,time,hours,ui.editJob||null);
  const c=cleanerById(cid);const wk=weekBookedHours(cid,date,ui.editJob||null)+hours;
  let msgs=[],hard=false;
  conf.forEach(x=>{hard=true;msgs.push(`Already booked ${x.time}–${minToTime(jobEndMin(x))} for ${esc(x.client)} that day`);});
  const avail=weeklyHoursFor(c,date);
  if(c&&wk>avail)msgs.push(`This puts ${esc(c.name)} at ${wk.toFixed(1)}h this week (over their ${avail}h availability)`);
  if(c&&date&&!cleanerWorksDay(c,date))msgs.push(`${esc(c.name)} isn't set to work ${fmtDay(date)}s — fine for the odd job, but check they can make it`);
  div.innerHTML=msgs.length?`<div class="warn ${hard?'hard':''}">⚠ ${msgs.join("<br>⚠ ")}</div>`:"";
}
function repeatPreview(){
  const sel=$("#f_repeat"),prev=$("#repPrev");if(!sel||!prev)return;
  const ends=$("#f_ends")?$("#f_ends").value:"date";const wrap=$("#f_untilwrap");
  const step=REPEAT[sel.value].step;
  if(wrap)wrap.style.display=(step&&ends==="date")?"block":"none";
  if(!step){prev.textContent="";return;}
  const start=$("#f_date").value;
  if(ends==="open"){prev.textContent=`Repeats ${REPEAT[sel.value].label.toLowerCase()} from ${fmtShort(start)} with no end date — it'll keep topping up future bookings until you cancel the series.`;return;}
  const until=$("#f_until").value||addDaysISO(start,56);
  let d=start,n=0;while(d<=until&&n<60){n++;d=addDaysISO(d,step);}
  prev.textContent=`Creates ${n} booking${n>1?"s":""} — ${fmtShort(start)} to ${fmtShort(addDaysISO(start,step*(n-1)))}.`;
}

    save();toast(made+" booking"+(made===1?"":"s")+" created"+(open?" (repeating until cancelled)":""),"good");go("calendar");return;}
  state.jobs.push(Object.assign({id:uid("j"),cleanerConfirmed:false,stage:0,invoiceNo:null,invoicedDate:null,seriesId:null,seriesStep:null,seriesOpen:false,paidToCleaner:false,cleanerPaidDate:null,cancelled:false,cancelReason:"",cancelledDate:null},o));

/* ============================================================ TRACKER */
function pageTracker(){
  if(!ui.trackCal){const d=new Date();ui.trackCal={y:d.getFullYear(),m:d.getMonth()};}
  const all=ui.trackAll;
  let jobs,label,from,to;
  if(all){jobs=completedJobs();label="All time";}
  else{const {y,m}=ui.trackCal;from=isoOf(y,m,1);to=isoOf(y,m,new Date(y,m+1,0).getDate());
    jobs=completedJobs().filter(j=>j.date>=from&&j.date<=to);label=`${MONTHS[m]} ${y}`;}
  const rev=jobs.reduce((a,j)=>a+(+j.price||0),0),wag=jobs.reduce((a,j)=>a+(+j.wage||0),0);
  const exp=(all?(state.expenses||[]):expensesIn(from,to)).reduce((a,e)=>a+(+e.amount||0),0);
  const pf=rev-wag-exp;
  const hours=jobs.reduce((a,j)=>a+(+j.hours||0),0),margin=rev?pf/rev:0;
  // outstanding (live, all jobs): invoiced but not yet paid
  const invoiced=live().filter(j=>j.invoiceNo&&j.stage<S_PAID).reduce((a,j)=>a+(+j.price||0),0);
  const wagesOwed=completedJobs().filter(j=>!j.paidToCleaner).reduce((a,j)=>a+(+j.wage||0),0);
  // last 6 months profit
  const mb=[];const base=new Date();for(let i=5;i>=0;i--){const d=new Date(base.getFullYear(),base.getMonth()-i,1);
    const f=isoOf(d.getFullYear(),d.getMonth(),1),t=isoOf(d.getFullYear(),d.getMonth(),new Date(d.getFullYear(),d.getMonth()+1,0).getDate());
    const js=completedJobs().filter(j=>j.date>=f&&j.date<=t);mb.push({label:d.toLocaleDateString("en-GB",{month:"short"}),profit:js.reduce((a,j)=>a+profit(j),0),rev:js.reduce((a,j)=>a+(+j.price||0),0)});}
  const maxMB=Math.max(...mb.map(x=>x.rev),1);
  // by service + top clients
  const svc={};jobs.forEach(j=>{const k=j.service||"Other";svc[k]=svc[k]||{rev:0,profit:0,n:0};svc[k].rev+=(+j.price||0);svc[k].profit+=profit(j);svc[k].n++;});
  const svcArr=Object.entries(svc).sort((a,b)=>b[1].rev-a[1].rev);
  const cli={};jobs.forEach(j=>{const k=j.clientId||j.client;const name=clientById(j.clientId)?clientById(j.clientId).name:j.client;cli[k]=cli[k]||{name,rev:0,n:0};cli[k].rev+=(+j.price||0);cli[k].n++;});
  const cliArr=Object.values(cli).sort((a,b)=>b.rev-a.rev).slice(0,6);
  $("#wrap").innerHTML=`
    <div class="head-row"><div class="page-h"><h1>Tracker</h1><p>Performance for <b>${label}</b>, based on completed cleans.</p></div>
      <div class="calbar">
        <div class="seg"><button class="${!all?'on':''}" data-action="trackmode" data-m="month">Monthly</button><button class="${all?'on':''}" data-action="trackmode" data-m="all">All time</button></div>
        ${all?"":`<button class="btn sm" data-action="tracknav" data-n="-1">‹</button><span class="m" style="min-width:130px">${label}</span><button class="btn sm" data-action="tracknav" data-n="1">›</button>`}</div></div>
    <div class="kpis" style="margin-bottom:20px">
      ${kpi("Revenue",money0(rev),label,"green")}
      ${kpi("Wages",money0(wag),"paid to cleaners","")}
      ${kpi("Expenses",money0(exp),"mileage, allowances, etc","")}
      ${kpi("Profit",money0(pf),"revenue − wages − expenses",pf>=0?"brand":"red")}
      ${kpi("Margin",Math.round(margin*100)+"%","of revenue kept","")}
      ${kpi("Cleans",String(jobs.length),hours.toFixed(1)+"h worked","")}</div>
    <div class="grid2" style="grid-template-columns:1.3fr 1fr;margin-bottom:20px">
      <div class="card pad"><h3 style="font-size:15px;margin-bottom:4px">Last 6 months</h3>
        <p class="muted" style="font-size:13px;margin:0 0 6px">Revenue bar with profit shaded darker.</p>
        <div class="mbars">${mb.map(x=>`<div class="mbar"><div class="amt">${money0(x.profit)}</div>
          <div class="stack"><div class="fill" style="height:${x.rev/maxMB*100}%;background:linear-gradient(var(--brand) ${x.rev?Math.max(0,x.profit)/x.rev*100:0}%, #9db8f0 0)"></div></div>
          <div class="cap">${x.label}</div></div>`).join("")}</div></div>
      <div class="card pad"><h3 style="font-size:15px;margin-bottom:6px">Outstanding right now</h3>
        <div class="histrow"><span>Invoiced, awaiting payment</span><b class="mono">${money0(invoiced)}</b></div>
        <div class="histrow"><span>Wages owed to cleaners</span><b class="mono">${money0(wagesOwed)}</b></div>
        <p class="muted" style="font-size:12.5px;margin-top:10px">These are live totals across all jobs, not just ${label}.</p></div>
    </div>
    <div class="grid2" style="grid-template-columns:1fr 1fr">
      <div class="card pad"><h3 style="font-size:15px;margin-bottom:12px">By service type</h3>
        ${svcArr.length?svcArr.map(([k,v])=>`<div class="histrow"><div><b>${esc(k)}</b> <span class="muted">· ${v.n}</span></div><div class="mono">${money0(v.rev)} <span class="muted" style="font-size:12px">· ${money0(v.profit)} profit</span></div></div>`).join(""):'<p class="muted" style="font-size:13px">No data for this period.</p>'}</div>
      <div class="card pad"><h3 style="font-size:15px;margin-bottom:12px">Top clients</h3>
        ${cliArr.length?cliArr.map(v=>`<div class="histrow"><div><b>${esc(v.name)}</b> <span class="muted">· ${v.n} clean${v.n>1?"s":""}</span></div><div class="mono">${money0(v.rev)}</div></div>`).join(""):'<p class="muted" style="font-size:13px">No data for this period.</p>'}</div>
    </div>`;
}

function cancelClean(id){
  const j=state.jobs.find(x=>x.id===id);if(!j)return;
  const openSeries=j.seriesId&&state.jobs.some(x=>x.seriesId===j.seriesId&&x.seriesOpen&&!x.cancelled);
  const seriesFuture=j.seriesId?state.jobs.filter(x=>x.seriesId===j.seriesId&&!x.cancelled&&x.stage<S_COMPLETE&&x.date>j.date).length:0;
  openModal(`<div class="modal-h"><div><h2>Cancel this clean</h2><div class="muted" style="font-size:13px;margin-top:2px">${esc(j.client)} · ${fmtNice(j.date)}</div></div><button class="x" data-action="close">×</button></div>
    <div class="modal-b">
      <div class="field"><label>Reason for cancelling <span class="hint">(shown on the Cancelled page)</span></label>
        <textarea id="cx_reason" placeholder="e.g. client away, one-off skip, cleaner off sick">${esc(j.cancelReason||"")}</textarea></div>
      ${j.seriesId?`<div class="field"><label>This is a recurring clean</label>
        <div class="chips">
          <label class="chk on"><input type="radio" name="cxscope" value="one" checked>Just this one (${fmtShort(j.date)})</label>
          ${seriesFuture?`<label class="chk"><input type="radio" name="cxscope" value="future">This and all ${seriesFuture} future ones</label>`:""}
        </div>${openSeries?'<p class="muted" style="font-size:12px;margin-top:8px">Cancelling all future ones also stops this open-ended series from topping up again.</p>':''}</div>`:""}
    </div>
    <div class="modal-f"><button class="btn" data-action="close">Keep it</button><button class="btn danger" data-action="cancelcleando" data-id="${j.id}">Cancel this clean</button></div>`);
  document.querySelectorAll('input[name="cxscope"]').forEach(r=>r.addEventListener("change",()=>{
    document.querySelectorAll('input[name="cxscope"]').forEach(x=>x.closest(".chk").classList.toggle("on",x.checked));}));
}
function doCancelClean(id){
  const j=state.jobs.find(x=>x.id===id);if(!j)return;
  const reason=$("#cx_reason")?$("#cx_reason").value.trim():"";
  const scopeEl=document.querySelector('input[name="cxscope"]:checked');
  const future=scopeEl&&scopeEl.value==="future";
  const mark=x=>{x.cancelled=true;x.cancelReason=reason;x.cancelledDate=todayISO();};
  mark(j);
  let n=1;
  if(future&&j.seriesId){state.jobs.forEach(x=>{if(x.seriesId===j.seriesId&&!x.cancelled&&x.stage<S_COMPLETE&&x.date>j.date){mark(x);n++;}});
    state.jobs.forEach(x=>{if(x.seriesId===j.seriesId)x.seriesOpen=false;});}
  save();closeModal();render();toast(n===1?"Clean cancelled":n+" cleans cancelled","good");
}

  const total=jobs.reduce((a,j)=>a+(+j.hours||0),0);const line="————————————————————————————";
  const rows=[`Hi ${c.name},`,``,`Here's your rota for ${fmtShort(wk)} – ${fmtShort(sun)}. A PDF is attached.`,``,line,
    ...(jobs.length?jobs.map(j=>`${fmtDay(j.date)} ${fmtShort(j.date)}  ${j.time}–${minToTime(jobEndMin(j))}  ${j.client} — ${j.address||""} (${j.hours}h)`):["No jobs booked this week."]),line,``,
    `Total: ${total.toFixed(1)}h`,``,`Please confirm you've got these. Any issues, give me a shout.`,``,m.company,m.phone];
  window.location.href=`mailto:${c.email||""}?subject=${encodeURIComponent("Your rota "+fmtShort(wk)+"–"+fmtShort(sun)+" — "+m.company)}&body=${encodeURIComponent(rows.join("\r\n"))}`;
}
function rotaWhatsApp(cid){
  const m=state.meta,c=cleanerById(cid),wk=ui.rotaWeek||mondayISO(todayISO()),sun=addDaysISO(wk,6);
  const days=Array.from({length:7},(_,i)=>addDaysISO(wk,i));
  const jobs=state.jobs.filter(j=>j.cleanerId===cid&&j.date>=wk&&j.date<=sun&&j.stage<4);
  const total=jobs.reduce((a,j)=>a+(+j.hours||0),0);
  const L=[`*22 Clean Street — your rota*`,`_${fmtShort(wk)} – ${fmtShort(sun)}_`,``];
  let any=false;
  days.forEach(d=>{const dj=jobs.filter(j=>j.date===d).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));if(!dj.length)return;any=true;
    L.push(`*${fmtDay(d)} ${fmtShort(d)}*`);
    dj.forEach(j=>{L.push(`• ${j.time}–${minToTime(jobEndMin(j))}  ${j.client} (${j.hours}h)`);if(j.address)L.push(`   ${j.address}`);});
    L.push(``);});
  if(!any)L.push(`No jobs booked this week.`,``);
  L.push(`*Total: ${total.toFixed(1)}h*`,``,`📧 A full copy with all the details has been emailed to you.`);
  const num=waNumber(c.phone);
  const url=`https://wa.me/${num}?text=${encodeURIComponent(L.join("\n"))}`;
  const w=window.open(url,"_blank");
  if(!w)toast("Allow pop-ups to open WhatsApp","bad");
  else if(!num)toast("No mobile saved — pick the contact in WhatsApp","bad");
}

/* ---------- print helper ---------- */
function printDoc(title,inner){
  const w=window.open("","_blank","width=820,height=1040");
  if(!w){toast("Allow pop-ups to print / save PDF","bad");return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(title)}</title><style>*{box-sizing:border-box}body{margin:0;padding:34px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}${DOC_CSS}</style></head><body>${inner}</body></html>`);
  w.document.close();w.focus();setTimeout(()=>{try{w.print();}catch(e){}},350);
}

/* ---------- modal + toast + data ---------- */
function openModal(html,wide){$("#modal").className="modal"+(wide?" wide":"");$("#modal").innerHTML=html;$("#overlay").classList.add("show");}
function closeModal(){$("#overlay").classList.remove("show");$("#modal").innerHTML="";}
function toast(msg,kind){const t=document.createElement("div");t.className="toast"+(kind?" "+kind:"");t.textContent=msg;$("#toasts").appendChild(t);
  setTimeout(()=>{t.style.transition=".3s";t.style.opacity="0";t.style.transform="translateX(20px)";setTimeout(()=>t.remove(),300);},2500);}
function exportData(){const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="22cleanstreet-backup-"+todayISO()+".json";a.click();toast("Backup downloaded","good");}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.jobs||!d.cleaners)throw 0;state=d;migrate();save();render();toast("Data imported","good");}catch(x){toast("That file isn't a valid backup","bad");}};r.readAsText(f);}

/* ============================================================ EVENTS */
document.addEventListener("click",e=>{
  const tab=e.target.closest("[data-page]");if(tab){go(tab.dataset.page);return;}
  const db=e.target.closest("#dataBtn");if(db){$("#dataDrop").classList.toggle("show");return;}
  if(!e.target.closest(".datamenu"))$("#dataDrop").classList.remove("show");
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.dataset.action,d=el.dataset;
  switch(a){
    case "close":closeModal();break;
    case "bizdetails":$("#dataDrop").classList.remove("show");bizDetails();break;
    case "savebiz":saveBiz();break;
    case "export":exportData();$("#dataDrop").classList.remove("show");break;
    case "dologin":doLogin();break;
    case "forgot":doForgot();break;
    case "setpw":doSetPw();break;
    case "logout":doLogout();break;
    case "refresh":$("#dataDrop").classList.remove("show");load().then(()=>{render();toast("Refreshed from server","good");}).catch(e=>toast("Refresh failed — check connection","bad"));break;

    case "calnav":if(d.n==="0"){const t=new Date();ui.cal={y:t.getFullYear(),m:t.getMonth()};}else{let mm=ui.cal.m+ +d.n,yy=ui.cal.y;if(mm<0){mm=11;yy--;}if(mm>11){mm=0;yy++;}ui.cal={y:yy,m:mm};}render();break;
    case "utilnav":if(d.n==="0"){const t=new Date();ui.utilCal={y:t.getFullYear(),m:t.getMonth()};}else{let mm=ui.utilCal.m+ +d.n,yy=ui.utilCal.y;if(mm<0){mm=11;yy--;}if(mm>11){mm=0;yy++;}ui.utilCal={y:yy,m:mm};}render();break;
    case "tracknav":{let mm=ui.trackCal.m+ +d.n,yy=ui.trackCal.y;if(mm<0){mm=11;yy--;}if(mm>11){mm=0;yy++;}ui.trackCal={y:yy,m:mm};render();break;}
    case "trackmode":ui.trackAll=(d.m==="all");render();break;
    case "newbooking":ui.editJob=null;go("booking");break;
    case "addon":ui.editJob=null;ui.page="booking";render();setTimeout(()=>{const f=$("#f_date");if(f){f.value=d.d;const u=$("#f_until");if(u)u.value=addDaysISO(d.d,56);repeatPreview();}},0);break;

    case "job":jobModal(d.id);break;
    case "editjob":closeModal();ui.editJob=d.id;go("booking");break;
    case "tojob":closeModal();ui.progressJob=d.id;go("progress");break;
    case "deljob":if(confirm("Delete this booking?")){state.jobs=state.jobs.filter(j=>j.id!==d.id);save();closeModal();render();toast("Booking deleted");}break;
    case "savebooking":saveBooking(d.id);break;
    case "cancelEdit":ui.editJob=null;go("calendar");break;

    case "pmessaged":{const j=state.jobs.find(x=>x.id===d.id);const sel=$("#pAssign");if(!sel||!sel.value){toast("Choose a cleaner first","bad");break;}j.cleanerId=sel.value;j.cleanerConfirmed=false;j.stage=0;save();render();toast("Marked as messaged (amber)");break;}
    case "pconfirm":{const j=state.jobs.find(x=>x.id===d.id);const sel=$("#pAssign");const cid=(sel&&sel.value)||j.cleanerId;if(!cid){toast("Choose a cleaner first","bad");break;}
      const conf=cleanerConflicts(cid,j.date,j.time,j.hours,j.id);if(conf.length)toast("Heads up: clashes with another job that day","bad");
      j.cleanerId=cid;j.cleanerConfirmed=true;j.stage=S_ASSIGNED;save();render();toast("Cleaner confirmed (green)","good");waJobConfirm(j);break;}
    case "markpaid":{const j=state.jobs.find(x=>x.id===d.id);j.stage=S_PAID;save();ui.progressJob=null;render();toast("Payment received ✓","good");break;}
    case "pcomplete":{const j=state.jobs.find(x=>x.id===d.id);j.stage=S_COMPLETE;save();render();toast("Clean marked complete — payment next","good");break;}
    case "pback":{const j=state.jobs.find(x=>x.id===d.id);if(j.stage>0){j.stage--;if(j.stage<1)j.cleanerConfirmed=false;}save();render();break;}

    case "invopen":closeModal();openInvoice(d.id);break;
    case "invsend":{const j=state.jobs.find(x=>x.id===d.id);assignInvoiceNo(j);if(j.stage<2)j.stage=2;save();render();openInvoice(d.id);toast("Invoice sent · "+j.invoiceNo,"good");break;}
    case "invprint":printDoc((state.jobs.find(x=>x.id===d.id).invoiceNo||"Invoice")+" — "+state.meta.company,invoiceHTML(state.jobs.find(x=>x.id===d.id)));break;
    case "invemail":emailInvoice(d.id);break;

    case "editclient":closeModal();editClient(d.id||null);break;
    case "saveclient":saveClient(d.id);break;
    case "delclient":if(confirm("Delete this client? Their bookings stay but are no longer linked.")){state.jobs.forEach(j=>{if(j.clientId===d.id)j.clientId=null;});state.clients=state.clients.filter(c=>c.id!==d.id);save();closeModal();render();}break;
    case "clienthist":clientHistory(d.id);break;
    case "bookfor":{const c=clientById(d.id);closeModal();ui.editJob=null;ui.page="booking";render();setTimeout(()=>{
      $("#f_clientId").value=c.id;$("#f_client").value=c.name;$("#f_email").value=c.email||"";$("#f_address").value=c.address||"";
      $("#f_price").value=c.defaultPrice||"";$("#f_hours").value=c.defaultHours||2;$("#f_service").value=c.defaultService||"";},0);break;}

    case "editcleaner":closeModal();editCleaner(d.id||null);break;
    case "savecleaner":saveCleaner(d.id);break;
    case "delcleaner":if(confirm("Delete this cleaner? Their jobs stay but become unassigned.")){state.jobs.forEach(j=>{if(j.cleanerId===d.id){j.cleanerId=null;j.cleanerConfirmed=false;if(j.stage<4)j.stage=0;}});state.cleaners=state.cleaners.filter(c=>c.id!==d.id);save();closeModal();render();}break;

    case "cancelclean":closeModal();cancelClean(d.id);break;
    case "cancelcleando":doCancelClean(d.id);break;
    case "uncancel":{const j=state.jobs.find(x=>x.id===d.id);if(j){j.cancelled=false;j.cancelReason="";j.cancelledDate=null;save();closeModal();render();toast("Clean restored","good");}break;}

    case "editexpense":closeModal();editExpense(d.id||null);break;
    case "saveexpense":saveExpense(d.id);break;
    case "delexpense":if(confirm("Delete this expense?")){state.expenses=(state.expenses||[]).filter(e=>e.id!==d.id);save();closeModal();render();toast("Expense deleted");}break;
    case "expperiod":ui.expPeriod=d.p;render();break;

    case "payperiod":ui.payPeriod=d.p;render();break;
    case "markcleanerpaid":markCleanerPaid(d.id);if($("#overlay").classList.contains("show"))openRemittance(d.id);break;
    case "remit":openRemittance(d.id);break;
    case "remitprint":{const [f,t]=periodRange(ui.payPeriod||"thisweek");printDoc("Remittance — "+cleanerById(d.id).name,remittanceHTML(d.id,f,t));break;}
    case "remitemail":emailRemittance(d.id);break;

    case "rota":openRota(d.id);break;
    case "rotanav":ui.rotaWeek=addDaysISO(ui.rotaWeek||mondayISO(todayISO()),7*(+d.n));openRota(ui.rotaCleaner);break;
    case "rotaprint":printDoc("Rota — "+cleanerById(d.id).name,rotaHTML(d.id,ui.rotaWeek||mondayISO(todayISO())));break;
    case "rotaemail":emailRota(d.id);break;
    case "rotawa":rotaWhatsApp(d.id);break;

    case "utilpick":ui.utilCleaner=d.id;render();break;
  }
});
document.addEventListener("change",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;const a=el.dataset.action;
  if(a==="setweekhours"){const c=cleanerById(el.dataset.cid);if(!c)return;if(!c.hoursOverrides)c.hoursOverrides={};const mon=el.dataset.mon;const raw=el.value.trim();
    if(raw===""||+raw===c.weeklyHours){delete c.hoursOverrides[mon];}else{c.hoursOverrides[mon]=Math.max(0,+raw||0);}save();render();return;}
  if(el.tagName!=="SELECT")return;
  if(a==="progselect"){ui.progressJob=el.value||null;render();}
  else if(a==="calfilter"){ui.calFilter=el.value||null;render();}
  else if(a==="utilselect"){ui.utilCleaner=el.value||null;render();}
  else if(a==="payfilter"){ui.payCleaner=el.value||null;render();}
  else if(a==="expcat"){const w=$("#e_mileswrap");if(w)w.style.display=el.value==="mileage"?"block":"none";}
  else if(a==="passign"){progressWarn(el.dataset.id);}
  else if(a==="clientpick"){const c=clientById(el.value);if(c){$("#f_clientId").value=c.id;$("#f_client").value=c.name;$("#f_email").value=c.email||"";$("#f_address").value=c.address||"";$("#f_price").value=c.defaultPrice||"";$("#f_hours").value=c.defaultHours||2;$("#f_service").value=c.defaultService||"";const up=$("#moneyPrev");bookingWarn();}else{$("#f_clientId").value="";}}
});
$("#overlay").addEventListener("click",e=>{if(e.target===$("#overlay"))closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
$("#importFile").addEventListener("change",importData);

/* ---------- auth + boot ---------- */
function showGate(which){$("#authgate").classList.remove("hide");
  $("#auth_login").style.display=which==="login"?"block":"none";
  $("#auth_setpw").style.display=which==="setpw"?"block":"none";
  $("#auth_busy").style.display=which==="busy"?"block":"none";}
function hideGate(){$("#authgate").classList.add("hide");}
async function enterApp(){
  if(appReady)return;
  showGate("busy");
  try{await load();appReady=true;hideGate();render();}
  catch(e){console.error(e);showGate("login");$("#lg_err").textContent="Couldn't load your data: "+(e.message||"connection error");}
}
async function doLogin(){
  const email=$("#lg_email").value.trim(),pw=$("#lg_pw").value;$("#lg_err").textContent="";
  if(!email||!pw){$("#lg_err").textContent="Enter your email and password.";return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error)$("#lg_err").textContent=error.message;
}
async function doForgot(){
  const email=$("#lg_email").value.trim();
  if(!email){$("#lg_err").textContent="Enter your email first, then tap Forgot password.";return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
  $("#lg_err").textContent="";toast(error?error.message:"Password reset email sent — check your inbox",error?"bad":"good");
}
async function doSetPw(){
  const pw=$("#sp_pw").value;$("#sp_err").textContent="";
  if(!pw||pw.length<6){$("#sp_err").textContent="Password must be at least 6 characters.";return;}
  const {error}=await sb.auth.updateUser({password:pw});
  if(error){$("#sp_err").textContent=error.message;return;}
  history.replaceState(null,"",location.pathname);toast("Password set","good");enterApp();
}
async function doLogout(){$("#dataDrop").classList.remove("show");await sb.auth.signOut();appReady=false;state=null;location.reload();}
async function boot(){
  const st=document.createElement("style");st.textContent=DOC_CSS;document.head.appendChild(st);
  const recovery=/type=(recovery|invite)/.test(location.hash);
  const {data:{session}}=await sb.auth.getSession();
  if(recovery)showGate("setpw");
  else if(session)enterApp();
  else showGate("login");
  sb.auth.onAuthStateChange((ev,sess)=>{
    if(ev==="PASSWORD_RECOVERY")showGate("setpw");
    else if(ev==="SIGNED_IN"&&sess&&!appReady&&!recovery)enterApp();
    else if(ev==="SIGNED_OUT"){appReady=false;showGate("login");}
  });
}
document.addEventListener("keydown",e=>{if(e.key!=="Enter")return;
  if(e.target&&e.target.id==="lg_pw")doLogin();
  else if(e.target&&e.target.id==="sp_pw")doSetPw();});
boot();
